<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3E Pixel Controller</title>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/split-button.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/icon.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/radio-group.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/theme.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/card.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/menu.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/button.js/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@m3e/web/dist/loading-indicator.js/+esm"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        m3e-theme { font-family: 'Roboto', sans-serif; }

        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px;
            margin: 1em;
        }

        .picker-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 100px;
            overflow: hidden;
        }

        .mode-6 .pixel-even {
            display: none;
        }

        .hidden-input {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
            transform: scale(2);
        }

        .pixel-button { width: 100%; }

        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #444;
        }

        .tertiary {
            --m3e-card-container-color: var(--md-sys-color-tertiary-container) !important;
            background-color: var(--md-sys-color-tertiary-container) !important;
            color: var(--md-sys-color-on-tertiary-container) !important;
            
            padding: 8px 16px;
            border-radius: 16px;
            display: block;
        }

        .tertiary label {
            color: var(--md-sys-color-on-tertiary-container);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <m3e-theme motion="expressive" color="#FFDE3F">
        <div class="loading" style="display: none; height: 60vh; width: 100%; justify-content: center; align-items: center;">
            <m3e-loading-indicator variant="contained"></m3e-loading-indicator>
        </div>        
        <m3e-card class="hidable" style="min-height: 60vh; display: flex; flex-direction: column; margin: 2em;">
                
            <div style="flex-grow: 1;">
                <form id="pixels" action="http://192.168.2.14/set_pixels" method="GET">
                    <div id="grid-container" class="pixel-grid">
                        </div>
                </form>
                    <div class="mode-selector" style="padding: 16px; justify-content: center;">
                        <m3e-card class="tertiary" >
                            <m3e-radio-group>
                                <label>
                                    <m3e-radio type="radio" name="pixel-mode" value="6" checked onchange="toggleMode(6)"></m3e-radio> 6 Pixels
                                </label>
                                <label>
                                    <m3e-radio type="radio" name="pixel-mode" value="12" onchange="toggleMode(12)"></m3e-radio> 12 Pixels
                                </label>
                            </m3e-radio-group>
                        </m3e-card>
                    </div>
            </div>

            <div slot="actions" class="actions-bar" style="display: flex; justify-content: flex-end; padding: 16px;">
                <m3e-split-button>
                    <m3e-button slot="leading-button" variant="filled" type="submit" form="pixels" onclick="hide(document.querySelectorAll('.hidable'));show(document.querySelectorAll('.loading'), 'flex');">
                        Update
                    </m3e-button>
                    <m3e-button slot="trailing-button" variant="filled">
                        <m3e-icon name="keyboard_arrow_down"></m3e-icon>
                        <m3e-menu-trigger for="menu"></m3e-menu-trigger>
                    </m3e-button>
                </m3e-split-button>
                
                <m3e-menu id="menu" position-x="before">
                    <m3e-menu-item onclick="resetColors()">Reset Alle</m3e-menu-item>
                </m3e-menu>
            </div>
        </m3e-card> 
    </m3e-theme>

<script>
    const grid = document.getElementById('grid-container');
    const totalPixels = 12;

    for (let i = 1; i <= totalPixels; i++) {
        const isEven = i % 2 === 0;
        const wrapper = document.createElement('div');
        wrapper.className = `picker-wrapper ${isEven ? 'pixel-even' : 'pixel-odd'}`;

        wrapper.innerHTML = `
            <input type="color" name="c${i}" class="hidden-input" value="#FFFFFF" id="input-c${i}">
            <m3e-button variant="filled" id="btn-c${i}" class="pixel-button">
                P${i}
            </m3e-button>
        `;

        grid.appendChild(wrapper);

        const currentInput = wrapper.querySelector('input');
        const currentBtn = wrapper.querySelector('m3e-button');

        updatePixelStyle(currentBtn, currentInput.value);

        currentInput.addEventListener('input', (e) => {
            updatePixelStyle(currentBtn, e.target.value);
        });
    }

    function hide (elements) {
        elements = elements.length ? elements : [elements];
        for (var index = 0; index < elements.length; index++) {
            elements[index].style.display = 'none';
        }
    }

    function show (elements, specifiedDisplay) {
        elements = elements.length ? elements : [elements];
        for (var index = 0; index < elements.length; index++) {
            elements[index].style.display = specifiedDisplay || 'block';
        }
    }

    function toggleMode(count) {
        const evens = document.querySelectorAll('.pixel-even');
        const gridContainer = document.getElementById('grid-container');
        
        if (count === 6) {
            gridContainer.classList.add('mode-6');
            evens.forEach(el => {
                el.querySelector('input').disabled = true;
            });
        } else {
            gridContainer.classList.remove('mode-6');
            evens.forEach(el => {
                el.querySelector('input').disabled = false;
            });
        }
    }

    toggleMode(6)

    function updatePixelStyle(btn, color) {
        btn.style.setProperty('--m3e-filled-button-container-color', color);
        btn.style.setProperty('--m3e-button-container-color', color);

        const r = parseInt(color.substr(1,2), 16);
        const g = parseInt(color.substr(3,2), 16);
        const b = parseInt(color.substr(5,2), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        const textColor = brightness > 125 ? '#000000' : '#ffffff';
        
        btn.style.setProperty('--m3e-button-label-text-color', textColor);
        btn.style.setProperty('--m3e-filled-button-label-text-color', textColor);
    }

    function resetColors() {
        for (let i = 1; i <= totalPixels; i++) {
            const input = document.getElementById(`input-c${i}`);
            const btn = document.getElementById(`btn-c${i}`);
            input.value = "#FFFFFF";
            updatePixelStyle(btn, "#FFFFFF");
        }
    }
</script>
</body>
</html>
